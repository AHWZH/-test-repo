<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>A01 设备巡检填表页</title><style>body{font-family:Arial,sans-serif;padding:20px;max-width:600px;margin:0 auto;background:#f9f9f9}h2{color:#2c3e50;border-bottom:2px solid #3498db;padding-bottom:8px}input,select,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #bdc3c7;border-radius:4px}button{background:#3498db;color:white;padding:12px 24px;border:none;border-radius:4px;cursor:pointer;font-size:16px}button:hover{background:#2980b9}label{display:block;margin:12px 0 4px;font-weight:bold;color:#2c3e50}.status-box{display:flex;gap:8px;margin-top:8px}.status-btn{flex:1;padding:8px;text-align:center;border-radius:4px;cursor:pointer;transition:all 0.2s}.status-btn.active{background:#2ecc71;color:white}.status-btn.normal{background:#27ae60}.status-btn.abnormal{background:#e74c3c}.status-btn.pending{background:#f39c12}</style></head><body><h2>📱 A01 设备巡检填表页</h2><p><strong>设备编号：</strong>A01<br><strong>设备名称：</strong>华为S5735交换机<br><strong>位置：</strong>3F东区弱电间-机柜A2</p><form id=\"form\"><label>巡检人：<input type=\"text\" name=\"巡检人\" required placeholder=\"请输入你的姓名\"></label><label>状态：<div class=\"status-box\"><button type=\"button\" class=\"status-btn normal active\" data-value=\"正常\">✅ 正常</button><button type=\"button\" class=\"status-btn abnormal\" data-value=\"异常\">❌ 异常</button><button type=\"button\" class=\"status-btn pending\" data-value=\"待处理\">⏳ 待处理</button></div><input type=\"hidden\" name=\"状态\" id=\"status-input\" value=\"正常\"></label><label>问题描述：<textarea name=\"问题描述\" rows=\"4\" placeholder=\"异常时请填写详情（如：风扇异响、指示灯不亮等）\"></textarea></label><button type=\"submit\">💾 提交巡检记录</button></form><p><small>✅ 提交后将自动生成 CSV 文件，可导入 Excel 汇总分析</small></p><script>document.querySelectorAll('.status-btn').forEach(btn => {btn.addEventListener('click', () => {document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));btn.classList.add('active');document.getElementById('status-input').value = btn.dataset.value;});});document.getElementById('form').addEventListener('submit', (e) => {e.preventDefault();const formData = new FormData(e.target);const now = new Date().toISOString().slice(0,19).replace('T',' ');const csv = [`设备编号,巡检人,巡检时间,上次巡检时间,状态,问题描述`,`A01,${formData.get('巡检人')},${now},,${formData.get('状态')},${formData.get('问题描述')}`].join('\n');const blob = new Blob([csv], {type: 'text/csv'});const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = `A01-巡检记录-${now.replace(/[: ]/g,'-')}.csv`;a.click();URL.revokeObjectURL(url);alert('✅ 提交成功！已生成 CSV 文件，请导入 Excel 查看。');});</script></body></html>
